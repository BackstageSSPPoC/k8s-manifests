apiVersion: v1
kind: Service
metadata:
  name: dssp-targetp-10
  namespace: dev
  labels:
    backstage.io/kubernetes-id: dssp-targetp-10
    environment: dev
spec:
  selector:
    app: dssp-targetp-10
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
 


