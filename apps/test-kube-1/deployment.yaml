apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-kube-1
  labels:
    backstage.io/kubernetes-id: test-kube-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-kube-1
  template:
    metadata:
      labels:
        app: test-kube-1
        backstage.io/kubernetes-id: test-kube-1
    spec:
      containers:
        - name: test-kube-1
          image: chaitanyapandeygspann/test-kube-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000