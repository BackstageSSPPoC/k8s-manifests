apiVersion: v1
kind: Service
metadata:
  name: dssp-targetp-3
  namespace: qat
spec:
  selector:
    app: dssp-targetp-3
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
 


