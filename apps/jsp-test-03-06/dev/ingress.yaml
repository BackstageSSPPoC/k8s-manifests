apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: jsp-test-03-06
  namespace: dev
  labels:
    backstage.io/kubernetes-id: jsp-test-03-06
    environment: dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx  
  rules:
    - http:
        paths:
          - path: /jsp-test-03-06-dev(/|$)(.*) 
            pathType: ImplementationSpecific
            backend:
              service:
                name: jsp-test-03-06
                port:
                  number: 80
