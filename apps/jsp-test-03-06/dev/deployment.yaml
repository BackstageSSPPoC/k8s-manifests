apiVersion: apps/v1
kind: Deployment
metadata:
  name: jsp-test-03-06
  namespace: dev
  labels:
    app: jsp-test-03-06
    backstage.io/kubernetes-id: jsp-test-03-06
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jsp-test-03-06
  template:
    metadata:
      labels:
        app: jsp-test-03-06
        backstage.io/kubernetes-id: jsp-test-03-06
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: jsp-test-03-06
          image: ${Wrong_DOCKER_IMAGE_}
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "dev"
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "100Mi"
