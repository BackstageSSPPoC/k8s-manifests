apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonar-test-6
  labels:
    backstage.io/kubernetes-id: sonar-test-6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonar-test-6
  template:
    metadata:
      labels:
        app: sonar-test-6
        backstage.io/kubernetes-id: sonar-test-6
    spec:
      containers:
        - name: sonar-test-6
          image: chaitanyapandeygspann/sonar-test-6:1.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000