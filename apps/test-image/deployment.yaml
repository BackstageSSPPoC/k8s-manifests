apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-image
  labels:
    backstage.io/kubernetes-id: test-image
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-image
  template:
    metadata:
      labels:
        app: test-image
        backstage.io/kubernetes-id: test-image
    spec:
      containers:
        - name: test-image
          image: chaitanyapandeygspann/test-image:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000