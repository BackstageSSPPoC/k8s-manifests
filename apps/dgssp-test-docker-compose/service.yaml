apiVersion: v1
kind: Service
metadata:
  name: dgssp-test-docker-compose
spec:
  selector:
    app: dgssp-test-docker-compose
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer


