apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-6
  namespace: prod
  labels:
    app: dssp-targetp-6
    backstage.io/kubernetes-id: dssp-targetp-6
    environment: prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-6
  template:
    metadata:
      labels:
        app: dssp-targetp-6
        backstage.io/kubernetes-id: dssp-targetp-6
        environment: prod
    spec:
      containers:
        - name: dssp-targetp-6
          image: chaitanyapandeygspann/dssp-targetp-6:1.0.11
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "prod"