apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-pythontest-2
  namespace: dev
  labels:
    app: dssp-pythontest-2
    backstage.io/kubernetes-id: dssp-pythontest-2
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-pythontest-2
  template:
    metadata:
      labels:
        app: dssp-pythontest-2
        backstage.io/kubernetes-id: dssp-pythontest-2
        environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: dssp-pythontest-2
          image: chaitanyapandeygspann/dssp-pythontest-2:1.0.8
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "100Mi"
