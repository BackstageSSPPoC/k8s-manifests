apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-march-13
  labels:
    backstage.io/kubernetes-id: demo-march-13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-march-13
  template:
    metadata:
      labels:
        app: demo-march-13
        backstage.io/kubernetes-id: demo-march-13
    spec:
      containers:
        - name: demo-march-13
          image: chaitanyapandeygspann/demo-march-13:1.0.2
          imagePullPolicy: Always
          ports:
            - containerPort: 3000