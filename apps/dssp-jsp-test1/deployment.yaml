apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-jsp-test1
  labels:
    backstage.io/kubernetes-id: dssp-jsp-test1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-jsp-test1
  template:
    metadata:
      labels:
        app: dssp-jsp-test1
        backstage.io/kubernetes-id: dssp-jsp-test1
    spec:
      containers:
        - name: dssp-jsp-test1
          image: chaitanyapandeygspann/dssp-jsp-test1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080