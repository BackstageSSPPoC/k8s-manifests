apiVersion: v1
kind: Service
metadata:
  name: dssp-targetp-7
  namespace: qat
  labels:
    backstage.io/kubernetes-id: dssp-targetp-7
    environment: qat
spec:
  selector:
    app: dssp-targetp-7
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
 


