apiVersion: apps/v1
kind: Deployment
metadata:
  name: dot-1
  labels:
    backstage.io/kubernetes-id: dot-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dot-1
  template:
    metadata:
      labels:
        app: dot-1
        backstage.io/kubernetes-id: dot-1
    spec:
      containers:
        - name: dot-1
          image: chaitanyapandeygspann/dot-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000