apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-2-apr-01
  labels:
    backstage.io/kubernetes-id: dssp-2-apr-01
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-2-apr-01
  template:
    metadata:
      labels:
        app: dssp-2-apr-01
        backstage.io/kubernetes-id: dssp-2-apr-01
    spec:
      containers:
        - name: dssp-2-apr-01
          image: chaitanyapandeygspann/dssp-2-apr-01:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000