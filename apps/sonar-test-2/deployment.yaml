apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonar-test-2
  labels:
    backstage.io/kubernetes-id: sonar-test-2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonar-test-2
  template:
    metadata:
      labels:
        app: sonar-test-2
        backstage.io/kubernetes-id: sonar-test-2
    spec:
      containers:
        - name: sonar-test-2
          image: chaitanyapandeygspann/sonar-test-2:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000