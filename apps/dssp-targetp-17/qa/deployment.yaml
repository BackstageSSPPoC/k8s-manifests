apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-17
  namespace: qa
  labels:
    app: dssp-targetp-17
    backstage.io/kubernetes-id: dssp-targetp-17
    environment: qa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-17
  template:
    metadata:
      labels:
        app: dssp-targetp-17
        backstage.io/kubernetes-id: dssp-targetp-17
        environment: qa
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      containers:
        - name: dssp-targetp-17
          image: chaitanyapandeygspann/dssp-targetp-17:1.0.3
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "qa"
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
              ephemeral-storage: "50Mi"
            limits:
              memory: "128Mi"
              cpu: "100m"
              ephemeral-storage: "100Mi"
