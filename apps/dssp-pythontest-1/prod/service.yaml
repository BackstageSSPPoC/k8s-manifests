apiVersion: v1
kind: Service
metadata:
  name: dssp-pythontest-1
  namespace: prod
  labels:
    backstage.io/kubernetes-id: dssp-pythontest-1
    environment: prod
spec:
  selector:
    app: dssp-pythontest-1
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
 


