apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-test-1
  labels:
    backstage.io/kubernetes-id: demo-test-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-test-1
  template:
    metadata:
      labels:
        app: demo-test-1
        backstage.io/kubernetes-id: demo-test-1
    spec:
      containers:
        - name: demo-test-1
          image: chaitanyapandeygspann/demo-test-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000