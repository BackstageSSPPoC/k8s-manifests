apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonar-test-5
  labels:
    backstage.io/kubernetes-id: sonar-test-5
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonar-test-5
  template:
    metadata:
      labels:
        app: sonar-test-5
        backstage.io/kubernetes-id: sonar-test-5
    spec:
      containers:
        - name: sonar-test-5
          image: chaitanyapandeygspann/sonar-test-5:1.0.4
          imagePullPolicy: Always
          ports:
            - containerPort: 3000