apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-54
  namespace: dev
  labels:
    app: dssp-targetp-54
    backstage.io/kubernetes-id: dssp-targetp-54
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-54
  template:
    metadata:
      labels:
        app: dssp-targetp-54
        backstage.io/kubernetes-id: dssp-targetp-54
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-54
          image: chaitanyapandeygspann/dssp-targetp-54:1.0.3
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
