apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaitanya-1
  labels:
    backstage.io/kubernetes-id: chaitanya-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaitanya-1
  template:
    metadata:
      labels:
        app: chaitanya-1
        backstage.io/kubernetes-id: chaitanya-1
    spec:
      containers:
        - name: chaitanya-1
          image: chaitanyapandeygspann/chaitanya-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000