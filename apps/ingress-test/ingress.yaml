apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-test
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - http:
        paths:
          - path: /ingress-test
            pathType: Prefix
            backend:
              service:
                name: ingress-test
                port:
                  number: 80
