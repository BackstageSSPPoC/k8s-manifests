apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-13
  namespace: dev
  labels:
    app: dssp-targetp-13
    backstage.io/kubernetes-id: dssp-targetp-13
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-13
  template:
    metadata:
      labels:
        app: dssp-targetp-13
        backstage.io/kubernetes-id: dssp-targetp-13
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-13
          image: chaitanyapandeygspann/dssp-targetp-13:1.0.2
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"