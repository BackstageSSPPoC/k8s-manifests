apiVersion: apps/v1
kind: Deployment
metadata:
  name: gssp-test-br-1
  labels:
    backstage.io/kubernetes-id: gssp-test-br-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gssp-test-br-1
  template:
    metadata:
      labels:
        app: gssp-test-br-1
        backstage.io/kubernetes-id: gssp-test-br-1
    spec:
      containers:
        - name: gssp-test-br-1
          image: chaitanyapandeygspann/gssp-test-br-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000