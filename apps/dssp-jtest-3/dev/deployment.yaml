apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-jtest-3
  namespace: dev
  labels:
    app: dssp-jtest-3
    backstage.io/kubernetes-id: dssp-jtest-3
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-jtest-3
  template:
    metadata:
      labels:
        app: dssp-jtest-3
        backstage.io/kubernetes-id: dssp-jtest-3
        environment: dev
    spec:
      containers:
        - name: dssp-jtest-3
          image: chaitanyapandeygspann/dssp-jtest-3:1.0.11
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "dev"
