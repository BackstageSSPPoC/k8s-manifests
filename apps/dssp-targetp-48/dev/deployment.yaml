apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-48
  namespace: dev
  labels:
    app: dssp-targetp-48
    backstage.io/kubernetes-id: dssp-targetp-48
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-48
  template:
    metadata:
      labels:
        app: dssp-targetp-48
        backstage.io/kubernetes-id: dssp-targetp-48
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-48
          image: chaitanyapandeygspann/dssp-targetp-48:1.0.5
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
