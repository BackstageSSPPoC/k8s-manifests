apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-python-test-8
  labels:
    backstage.io/kubernetes-id: dssp-python-test-8
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-python-test-8
  template:
    metadata:
      labels:
        app: dssp-python-test-8
        backstage.io/kubernetes-id: dssp-python-test-8
    spec:
      containers:
        - name: dssp-python-test-8
          image: chaitanyapandeygspann/dssp-python-test-8:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000