apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-44
  namespace: dev
  labels:
    app: dssp-targetp-44
    backstage.io/kubernetes-id: dssp-targetp-44
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-44
  template:
    metadata:
      labels:
        app: dssp-targetp-44
        backstage.io/kubernetes-id: dssp-targetp-44
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-44
          image: chaitanyapandeygspann/dssp-targetp-44:1.0.6
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
