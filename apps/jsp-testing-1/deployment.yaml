apiVersion: apps/v1
kind: Deployment
metadata:
  name: jsp-testing-1
  labels:
    backstage.io/kubernetes-id: jsp-testing-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jsp-testing-1
  template:
    metadata:
      labels:
        app: jsp-testing-1
        backstage.io/kubernetes-id: jsp-testing-1
    spec:
      containers:
        - name: jsp-testing-1
          image: chaitanyapandeygspann/jsp-testing-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: ${APP_PORTS}