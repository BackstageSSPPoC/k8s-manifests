apiVersion: apps/v1
kind: Deployment
metadata:
  name: ip-test-1
  labels:
    backstage.io/kubernetes-id: ip-test-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ip-test-1
  template:
    metadata:
      labels:
        app: ip-test-1
        backstage.io/kubernetes-id: ip-test-1
    spec:
      containers:
        - name: ip-test-1
          image: chaitanyapandeygspann/ip-test-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000