apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-python-project
  namespace: dev
  labels:
    app: dssp-python-project
    backstage.io/kubernetes-id: dssp-python-project
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-python-project
  template:
    metadata:
      labels:
        app: dssp-python-project
        backstage.io/kubernetes-id: dssp-python-project
        environment: dev
    spec:
      containers:
        - name: dssp-python-project
          image: chaitanyapandeygspann/dssp-python-project:1.0.3
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
