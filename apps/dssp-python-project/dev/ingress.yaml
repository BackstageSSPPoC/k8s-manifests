apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dssp-python-project
  namespace: dev
  labels:
    backstage.io/kubernetes-id: dssp-python-project
    environment: dev
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /dssp-python-project-dev(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: dssp-python-project
                port:
                  number: 80
