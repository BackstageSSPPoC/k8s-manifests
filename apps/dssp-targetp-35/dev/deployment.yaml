apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-35
  namespace: dev
  labels:
    app: dssp-targetp-35
    backstage.io/kubernetes-id: dssp-targetp-35
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-35
  template:
    metadata:
      labels:
        app: dssp-targetp-35
        backstage.io/kubernetes-id: dssp-targetp-35
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-35
          image: ${DOCKER_IMGE}
          ports:
            - containerPort: ${APP_P}
          env:
            - name: APP_ENV
              value: "dev"
