apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-50
  namespace: dev
  labels:
    app: dssp-targetp-50
    backstage.io/kubernetes-id: dssp-targetp-50
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-50
  template:
    metadata:
      labels:
        app: dssp-targetp-50
        backstage.io/kubernetes-id: dssp-targetp-50
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-50
          image: chaitanyapandeygspann/dssp-targetp-50:1.0.4
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
