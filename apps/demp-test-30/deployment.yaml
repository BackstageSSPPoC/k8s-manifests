apiVersion: apps/v1
kind: Deployment
metadata:
  name: demp-test-30
  labels:
    backstage.io/kubernetes-id: demp-test-30
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demp-test-30
  template:
    metadata:
      labels:
        app: demp-test-30
        backstage.io/kubernetes-id: demp-test-30
    spec:
      containers:
        - name: demp-test-30
          image: chaitanyapandeygspann/demp-test-30:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000