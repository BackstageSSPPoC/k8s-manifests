apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-test-apr-21
  labels:
    backstage.io/kubernetes-id: dssp-test-apr-21
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-test-apr-21
  template:
    metadata:
      labels:
        app: dssp-test-apr-21
        backstage.io/kubernetes-id: dssp-test-apr-21
    spec:
      containers:
        - name: dssp-test-apr-21
          image: chaitanyapandeygspann/dssp-test-apr-21:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000