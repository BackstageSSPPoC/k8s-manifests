apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-python-test-6
  labels:
    backstage.io/kubernetes-id: dssp-python-test-6
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-python-test-6
  template:
    metadata:
      labels:
        app: dssp-python-test-6
        backstage.io/kubernetes-id: dssp-python-test-6
    spec:
      containers:
        - name: dssp-python-test-6
          image: chaitanyapandeygspann/dssp-python-test-6:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000