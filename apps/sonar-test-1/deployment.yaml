apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonar-test-1
  labels:
    backstage.io/kubernetes-id: sonar-test-1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonar-test-1
  template:
    metadata:
      labels:
        app: sonar-test-1
        backstage.io/kubernetes-id: sonar-test-1
    spec:
      containers:
        - name: sonar-test-1
          image: chaitanyapandeygspann/sonar-test-1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000