apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dssp-jsp-testing-12-may
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2   
spec:
  rules:
    - http:
        paths:
          - path: /dssp-jsp-testing-12-may(/|$)(.*)               
            pathType: ImplementationSpecific          
            backend:
              service:
                name: dssp-jsp-testing-12-may
                port:
                  number: 80
