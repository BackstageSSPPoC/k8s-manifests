apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-project
  namespace: dev
  labels:
    app: python-project
    backstage.io/kubernetes-id: python-project
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: python-project
  template:
    metadata:
      labels:
        app: python-project
        backstage.io/kubernetes-id: python-project
        environment: dev
    spec:
      containers:
        - name: python-project
          image: chaitanyapandeygspann/python-project:1.0.3
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"