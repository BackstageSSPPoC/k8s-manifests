apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-python-test-4
  labels:
    backstage.io/kubernetes-id: dssp-python-test-4
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-python-test-4
  template:
    metadata:
      labels:
        app: dssp-python-test-4
        backstage.io/kubernetes-id: dssp-python-test-4
    spec:
      containers:
        - name: dssp-python-test-4
          image: chaitanyapandeygspann/dssp-python-test-4:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000