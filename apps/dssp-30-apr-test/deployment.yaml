apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-30-apr-test
  labels:
    backstage.io/kubernetes-id: dssp-30-apr-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-30-apr-test
  template:
    metadata:
      labels:
        app: dssp-30-apr-test
        backstage.io/kubernetes-id: dssp-30-apr-test
    spec:
      containers:
        - name: dssp-30-apr-test
          image: chaitanyapandeygspann/dssp-30-apr-test:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000