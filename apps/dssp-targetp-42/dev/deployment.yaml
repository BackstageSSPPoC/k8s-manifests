apiVersion: apps/v1
kind: Deployment
metadata:
  name: dssp-targetp-42
  namespace: dev
  labels:
    app: dssp-targetp-42
    backstage.io/kubernetes-id: dssp-targetp-42
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dssp-targetp-42
  template:
    metadata:
      labels:
        app: dssp-targetp-42
        backstage.io/kubernetes-id: dssp-targetp-42
        environment: dev
    spec:
      containers:
        - name: dssp-targetp-42
          image: chaitanyapandeygspann/dssp-targetp-42:1.0.2
          ports:
            - containerPort: 5000
          env:
            - name: APP_ENV
              value: "dev"
