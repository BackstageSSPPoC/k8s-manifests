apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-sample-app1
  labels:
    backstage.io/kubernetes-id: java-sample-app1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: java-sample-app1
  template:
    metadata:
      labels:
        app: java-sample-app1
        backstage.io/kubernetes-id: java-sample-app1
    spec:
      containers:
        - name: java-sample-app1
          image: chaitanyapandeygspann/java-sample-app1:1.0.1
          imagePullPolicy: Always
          ports:
            - containerPort: 3000